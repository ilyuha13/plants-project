# ============================================
# Secrets for Plants Project
# ============================================
# IMPORTANT: This is a template file
# Before applying, you need to base64 encode your secrets:
#   echo -n "your-secret-value" | base64
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: plants-secrets
  namespace: plants
type: Opaque
data:
  # PostgreSQL
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE

  # JWT & Auth
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  PASSWORD_SALT: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Cloudinary
  CLOUDINARY_CLOUD_NAME: REPLACE_WITH_BASE64_ENCODED_VALUE
  CLOUDINARY_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  CLOUDINARY_API_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Telegram
  TELEGRAM_BOT_TOKEN: REPLACE_WITH_BASE64_ENCODED_VALUE
  TELEGRAM_BOT_USERNAME: REPLACE_WITH_BASE64_ENCODED_VALUE
  TELEGRAM_ADMIN_CHAT_ID: REPLACE_WITH_BASE64_ENCODED_VALUE

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plants-config
  namespace: plants
data:
  POSTGRES_DB: plants_db
  POSTGRES_USER: plants_user
  NODE_ENV: production
  HOST_ENV: production
  PORT: "3000"
